name: Refresh latest prices

on:
  schedule:
    # 6pm EST on weekdays. The committed JSON snapshot triggers deploy.yml.
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm run refresh-prices
      - run: npm run refresh-segment-metrics
      - name: Commit price snapshot if changed
        run: |
          if [[ -n "$(git status --porcelain data/prices/latest.json data/segments/metrics.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/prices/latest.json data/segments/metrics.json
            git commit -m "chore: refresh latest market snapshots"
            git push
          fi
