name: Refresh Berkshire dry powder

on:
  schedule:
    # Berkshire cash/T-bill balances are disclosed in 10-Q/10-K filings, not 13Fs.
    # Poll every 30 minutes during likely Berkshire reporting windows, plus once
    # daily year-round as a backstop for unusual filing timing.
    - cron: '*/30 * 20-29 2 *'
    - cron: '*/30 * 1-7 3 *'
    - cron: '*/30 * 1-10 5,8,11 *'
    - cron: '17 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm run refresh-dry-powder
      - run: npm run validate
      - name: Commit dry powder snapshot if changed
        run: |
          if [[ -n "$(git status --porcelain data/funds/berkshire-hathaway/dry-powder.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/funds/berkshire-hathaway/dry-powder.json
            git commit -m "chore: refresh berkshire dry powder"
            git push
          fi
