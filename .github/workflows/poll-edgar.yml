# .github/workflows/poll-edgar.yml
name: Poll EDGAR for new 13F filings

on:
  schedule:
    # Every 4 hours during days 9-18 of the four filing-window months
    # (Feb / May / Aug / Nov). The 10-day window covers the actual filing
    # cluster — historically funds file 0-5 days before the deadline (which
    # falls on the 14th or 15th, rolling to ~17th when on a weekend), plus
    # a small buffer for late filings and amendments. Days 1-8 are skipped
    # because no fund in our sample has ever filed that early. Worst-case
    # lag from EDGAR-publish to our queue is ~4 hours.
    - cron: '0 */4 9-18 2,5,8,11 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run poll-edgar
      - name: Commit, push, and email if a new filing was queued
        run: |
          if [[ -n "$(git status --porcelain data/_pending.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/_pending.json
            git commit -m "chore: queue new 13F filing(s) for review"
            git push
            npm run remind
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
