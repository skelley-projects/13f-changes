# .github/workflows/poll-edgar.yml
name: Poll EDGAR for new 13F filings

on:
  schedule:
    # Every 4 hours during days 1-18 of the four filing-window months
    # (Feb / May / Aug / Nov). Worst-case lag from EDGAR-publish to our queue
    # is ~4 hours. Most polls are silent no-ops; only commits + emails when
    # a fund actually files.
    - cron: '0 */4 1-18 2,5,8,11 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run poll-edgar
      - name: Commit, push, and email if a new filing was queued
        run: |
          if [[ -n "$(git status --porcelain data/_pending.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/_pending.json
            git commit -m "chore: queue new 13F filing(s) for review"
            git push
            npm run remind
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
