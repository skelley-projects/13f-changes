# .github/workflows/poll-edgar.yml
name: Poll EDGAR for new 13F filings

on:
  schedule:
    # Tight polling around each quarter's filing deadline (Q1=May 15,
    # Q2=Aug 14, Q3=Nov 14, Q4=Feb 14):
    #   - Day before deadline: every 30 min, all hours
    #   - Deadline day: every 15 min, 12:00-23:59 UTC (≈ 8am-8pm EDT for
    #     May/Aug; ≈ 7am-7pm EST for Nov/Feb)
    #   - Day after deadline: every 30 min, all hours
    # All other times: no polling. Worst-case detection lag = 30 min on
    # day before/after, 15 min on day of.
    #
    # Caveat: when the nominal deadline falls on a weekend (Nov 2026,
    # Feb 2027), the legal deadline rolls to Monday and this schedule
    # would miss filings made on the rolled deadline day. Adjust manually
    # via workflow_dispatch or expand the window for those quarters.

    # Q1 day-before (May 14) and day-after (May 16), every 30 min
    - cron: '*/30 * 14,16 5 *'
    # Q1 deadline day (May 15), every 15 min during business hours UTC
    - cron: '*/15 12-23 15 5 *'
    # Q2/Q3/Q4 day-before (13) and day-after (15), every 30 min
    - cron: '*/30 * 13,15 2,8,11 *'
    # Q2/Q3/Q4 deadline day (14), every 15 min during business hours UTC
    - cron: '*/15 12-23 14 2,8,11 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run poll-edgar
      - name: Commit, push, and email if a new filing was queued
        run: |
          if [[ -n "$(git status --porcelain data/_pending.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/_pending.json
            git commit -m "chore: queue new 13F filing(s) for review"
            git push
            npm run remind
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
